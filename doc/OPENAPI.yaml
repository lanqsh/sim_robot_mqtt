          example: 12
        battery_voltage:
          type: integer
          description: 电池电压（单位：100mV）
          example: 246
        battery_current:
          type: integer
          description: 电池电流（单位：100mA）
          example: 30
        battery_status:
          type: integer
          description: 电池状态标志位
          example: 1
        battery_level:
          type: integer
          description: 电池电量（%）
          example: 80
        battery_temperature:
          type: integer
          description: 电池温度（°C）
          example: 25
        position:
          type: integer
          description: 位置编号
          example: 3
        working_duration:
          type: integer
          description: 工作时长（分钟）
          example: 120
        solar_voltage:
          type: integer
          description: 光伏板输出电压（单位：100mV）
          example: 175
        solar_current:
          type: integer
          description: 光伏板输出电流（单位：100mA）
          example: 50
        total_run_count:
          type: integer
          description: 累计运行次数
          example: 200
        current_lap_count:
