    ReportIntervalsResponse:
      type: object
      required: [success, robot_data_report_interval, motor_params_report_interval, lora_clean_report_interval]
      properties:
        success:
          type: boolean
          example: true
        robot_data_report_interval:
          type: integer
          description: 机器人数据上报间隔（秒）
          minimum: 10
          example: 600
        motor_params_report_interval:
          type: integer
          description: 电机参数上报间隔（秒）
          minimum: 10
          example: 3600
        lora_clean_report_interval:
          type: integer
          description: Lora参数&清扫设置上报间隔（秒）
          minimum: 10
          example: 3600
        message:
          type: string
          description: 保存成功时的说明（仅 POST 返回）
          example: 上报间隔已更新并实时生效

    SetReportIntervalsRequest:
      type: object
      description: 三个字段均可选，不填则保持数据库当前值（默认：robot_data=600s，其余=3600s），每类最小值 10 秒。
      properties:
        robot_data_report_interval:
          type: integer
          description: 机器人数据上报间隔（秒），最小 10
          minimum: 10
          example: 600
        motor_params_report_interval:
          type: integer
          description: 电机参数上报间隔（秒），最小 10
          minimum: 10
          example: 3600
        lora_clean_report_interval:
          type: integer
          description: Lora参数&清扫设置上报间隔（秒），最小 10
          minimum: 10
          example: 3600

    MqttConfigResponse:
      type: object
      required: [success, broker, username, connected]
      properties:
        success:
          type: boolean
          example: true
        broker:
          type: string
          description: MQTT Broker 地址
          example: "tcp://192.168.1.100:1883"
        username:
          type: string
          description: MQTT 用户名（密码不会回显）
          example: admin
        connected:
          type: boolean
          description: 当前是否已连接到 Broker
          example: true
        message:
          type: string
          description: 操作说明（仅 POST 返回）
          example: MQTT 重连成功

    SetMqttConfigRequest:
      type: object
      required: [broker]
      properties:
        broker:
          type: string
          description: MQTT Broker 地址，格式如 tcp://host:1883，不得为空
          example: "tcp://192.168.1.100:1883"
        username:
          type: string
          description: 用户名，可留空（不传或传空串表示匿名连接）
          example: admin
        password:
          type: string
          description: 密码，可留空
          example: secret

    FirmwareListResponse:
      type: object
      required: [success, version, files]
      properties:
        success:
          type: boolean
          example: true
        version:
          type: string
          description: 当前机器人软件版本号（同 /api/v1/system/version 返回的 version 字段）
          example: "1.0"
        files:
          type: array
          description: 目录下所有 .bin 固件文件列表
          items:
            type: object
            required: [filename, size]
            properties:
              filename:
                type: string
                description: 文件名
                example: 20250226132000.bin
              size:
                type: integer
                format: int64
                description: 文件大小（字节）
                example: 524288

    SystemVersionResponse:
      type: object
      required: [success, version, major, minor, patch]
      properties:
        success:
          type: boolean
          example: true
        version:
          type: string
          description: 完整版本字符串
          example: "1.4.0"
        major:
          type: integer
          example: 1
        minor:
          type: integer
          example: 4
        patch:
          type: integer
          example: 0
