<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机器人管理系统</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css?v=2.1">
    <link rel="stylesheet" href="../css/pages.css">
    <link rel="stylesheet" href="../css/tables.css">
    <link rel="stylesheet" href="../css/utils.css">
</head>
<body>
    <div class="container">
        <h1>机器人管理系统</h1>

        <!-- 添加机器人表单 -->
        <div class="add-robot-form">
            <div class="collapsible-header" onclick="toggleAddRobotForm()">
                <h2>添加新机器人</h2>
                <span class="collapse-icon" id="addRobotCollapseIcon">▼</span>
            </div>
            <div id="addRobotContent" style="display: none;">
                <div id="message"></div>
                <form id="addRobotForm">
                    <div class="inline-form">
                        <input type="number" id="serialNumber" name="serialNumber" min="1"
                               placeholder="序号（可选）" style="width: 120px;">
                        <input type="text" id="robotName" name="robotName"
                               placeholder="机器人名称（可选）" style="width: 180px;">
                        <div class="form-spacer"></div>
                        <button type="submit" class="btn btn-success">发送请求</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 批量操作区域 -->
        <div class="batch-operations">
            <div class="collapsible-header" onclick="toggleBatchForm()">
                <h2>批量增删机器人</h2>
                <span class="collapse-icon" id="batchCollapseIcon">▼</span>
            </div>
            <div class="batch-controls" id="batchFormContent" style="display: none;">
                <div class="inline-form">
                    <input type="number" id="batchStartSerial" min="1" placeholder="起始序号" style="width: 120px;">
                    <span>~</span>
                    <input type="number" id="batchEndSerial" min="1" placeholder="结束序号" style="width: 120px;">
                    <input type="text" id="batchNamePrefix" placeholder="名称前缀（可选）" style="width: 180px;">
                    <div class="form-spacer"></div>
                    <button class="btn btn-primary" onclick="batchAddRobots()">批量添加</button>
                    <button class="btn btn-danger" onclick="batchDeleteRobots()">批量删除</button>
                </div>
            </div>
        </div>

        <!-- 已移除主区的最近定时任务容器，详情模态中显示 -->

        <!-- 定时启动请求区域 -->
        <div class="schedule-request-section">
            <div class="collapsible-header" onclick="toggleScheduleForm()">
                <h2>定时启动请求</h2>
                <span class="collapse-icon" id="scheduleCollapseIcon">▼</span>
            </div>
            <div class="schedule-controls start-controls" id="scheduleFormContent" style="display: none;">
                <div class="schedule-inline-form start-inline-form">
                    <input type="text" id="scheduleRobotId" placeholder="机器人ID" style="width: 120px;">
                    <span class="or-text">或</span>
                    <input type="number" id="scheduleSerial" min="1" placeholder="序号" style="width: 100px;">
                    <input type="number" id="scheduleId" min="1" max="255" placeholder="定时编号" style="width: 100px;">
                    <select id="scheduleWeekday" style="width: 120px;">
                        <option value="0">星期日</option>
                        <option value="1">星期一</option>
                        <option value="2">星期二</option>
                        <option value="3">星期三</option>
                        <option value="4">星期四</option>
                        <option value="5">星期五</option>
                        <option value="6">星期六</option>
                    </select>
                    <input type="number" id="scheduleHour" min="0" max="23" placeholder="时" style="width: 100px;">
                    <input type="number" id="scheduleMinute" min="0" max="59" placeholder="分" style="width: 100px;">
                    <input type="number" id="scheduleRunCount" min="1" max="255" placeholder="运行次数" style="width: 100px;">
                    <div class="form-spacer"></div>
                    <button class="btn btn-success" onclick="sendScheduleRequest()">发送请求</button>
                </div>
            </div>
        </div>

        <!-- 定时设置区域(A2) -->
        <div class="schedule-request-section">
            <div class="collapsible-header" onclick="toggleScheduleParamsForm()">
                <h2>定时设置</h2>
                <span class="collapse-icon" id="scheduleParamsCollapseIcon">▼</span>
            </div>
            <div class="schedule-controls start-controls" id="scheduleParamsFormContent" style="display: none;">
                <div class="schedule-inline-form start-inline-form">
                    <input type="text" id="scheduleParamsRobotId" placeholder="机器人ID" style="width: 120px;">
                    <span class="or-text">或</span>
                    <input type="number" id="scheduleParamsSerial" min="1" placeholder="序号" style="width: 100px;">

                    <span>定时1</span>
                    <input type="number" id="a2Weekday1" min="0" max="6" placeholder="星期" style="width: 80px;" value="1">
                    <input type="number" id="a2Hour1" min="0" max="23" placeholder="时" style="width: 80px;" value="14">
                    <input type="number" id="a2Minute1" min="0" max="59" placeholder="分" style="width: 80px;" value="30">
                    <input type="number" id="a2RunCount1" min="0" max="255" placeholder="次数" style="width: 80px;" value="2">

                    <span>定时2</span>
                    <input type="number" id="a2Weekday2" min="0" max="6" placeholder="星期" style="width: 80px;" value="2">
                    <input type="number" id="a2Hour2" min="0" max="23" placeholder="时" style="width: 80px;" value="14">
                    <input type="number" id="a2Minute2" min="0" max="59" placeholder="分" style="width: 80px;" value="30">
                    <input type="number" id="a2RunCount2" min="0" max="255" placeholder="次数" style="width: 80px;" value="2">

                    <span>定时3</span>
                    <input type="number" id="a2Weekday3" min="0" max="6" placeholder="星期" style="width: 80px;" value="3">
                    <input type="number" id="a2Hour3" min="0" max="23" placeholder="时" style="width: 80px;" value="14">
                    <input type="number" id="a2Minute3" min="0" max="59" placeholder="分" style="width: 80px;" value="30">
                    <input type="number" id="a2RunCount3" min="0" max="255" placeholder="次数" style="width: 80px;" value="2">

                    <span>定时4</span>
                    <input type="number" id="a2Weekday4" min="0" max="6" placeholder="星期" style="width: 80px;" value="4">
                    <input type="number" id="a2Hour4" min="0" max="23" placeholder="时" style="width: 80px;" value="14">
                    <input type="number" id="a2Minute4" min="0" max="59" placeholder="分" style="width: 80px;" value="30">
                    <input type="number" id="a2RunCount4" min="0" max="255" placeholder="次数" style="width: 80px;" value="2">

                    <span>定时5</span>
                    <input type="number" id="a2Weekday5" min="0" max="6" placeholder="星期" style="width: 80px;" value="5">
                    <input type="number" id="a2Hour5" min="0" max="23" placeholder="时" style="width: 80px;" value="14">
                    <input type="number" id="a2Minute5" min="0" max="59" placeholder="分" style="width: 80px;" value="30">
                    <input type="number" id="a2RunCount5" min="0" max="255" placeholder="次数" style="width: 80px;" value="2">

                    <span>定时6</span>
                    <input type="number" id="a2Weekday6" min="0" max="6" placeholder="星期" style="width: 80px;" value="0">
                    <input type="number" id="a2Hour6" min="0" max="23" placeholder="时" style="width: 80px;" value="0">
                    <input type="number" id="a2Minute6" min="0" max="59" placeholder="分" style="width: 80px;" value="0">
                    <input type="number" id="a2RunCount6" min="0" max="255" placeholder="次数" style="width: 80px;" value="0">

                    <span>定时7</span>
                    <input type="number" id="a2Weekday7" min="0" max="6" placeholder="星期" style="width: 80px;" value="0">
                    <input type="number" id="a2Hour7" min="0" max="23" placeholder="时" style="width: 80px;" value="0">
                    <input type="number" id="a2Minute7" min="0" max="59" placeholder="分" style="width: 80px;" value="0">
                    <input type="number" id="a2RunCount7" min="0" max="255" placeholder="次数" style="width: 80px;" value="0">

                    <div class="form-spacer"></div>
                    <button class="btn btn-success" onclick="sendScheduleParamsRequest()">发送请求</button>
                </div>
            </div>
        </div>

        <!-- 电机参数设置区域 -->
        <div class="schedule-request-section">
            <div class="collapsible-header" onclick="toggleMotorParamsForm()">
                <h2>电机参数设置</h2>
                <span class="collapse-icon" id="motorParamsCollapseIcon">▼</span>
            </div>
            <div class="schedule-controls start-controls" id="motorParamsFormContent" style="display: none;">
                <div class="schedule-inline-form start-inline-form">
                    <input type="text" id="motorRobotId" placeholder="机器人ID" style="width: 120px;">
                    <span class="or-text">或</span>
                    <input type="number" id="motorSerial" min="1" placeholder="序号" style="width: 100px;">

                    <input type="number" id="walkMotorSpeed" min="0" max="255" placeholder="行走电机速率" style="width: 120px;">
                    <input type="number" id="brushMotorSpeed" min="0" max="255" placeholder="毛刷电机速率" style="width: 120px;">
                    <input type="number" id="windproofMotorSpeed" min="0" max="255" placeholder="防风电机速率" style="width: 120px;">

                    <input type="number" id="walkMotorMaxCurrent" min="0" max="65535" placeholder="行走上限电流(mA)" style="width: 150px;">
                    <input type="number" id="brushMotorMaxCurrent" min="0" max="65535" placeholder="毛刷上限电流(mA)" style="width: 150px;">
                    <input type="number" id="windproofMotorMaxCurrent" min="0" max="65535" placeholder="防风上限电流(mA)" style="width: 150px;">

                    <input type="number" id="walkMotorWarningCurrent" min="0" max="65535" placeholder="行走预警电流(mA)" style="width: 150px;">
                    <input type="number" id="brushMotorWarningCurrent" min="0" max="65535" placeholder="毛刷预警电流(mA)" style="width: 150px;">
                    <input type="number" id="windproofMotorWarningCurrent" min="0" max="65535" placeholder="防风预警电流(mA)" style="width: 150px;">

                    <input type="number" id="walkMotorMileage" min="0" max="65535" placeholder="设置总里程(m)" style="width: 130px;">
                    <input type="number" id="brushMotorTimeout" min="0" max="65535" placeholder="毛刷运行超时(s)" style="width: 130px;">
                    <input type="number" id="windproofMotorTimeout" min="0" max="65535" placeholder="防风运行超时(s)" style="width: 130px;">

                    <input type="number" id="reverseTime" min="0" max="255" placeholder="反转时间(s)" style="width: 120px;">
                    <input type="number" id="protectionAngle" min="0" max="255" placeholder="保护角度" style="width: 100px;">

                    <div class="form-spacer"></div>
                    <button class="btn btn-success" onclick="sendMotorParamsRequest()">发送请求</button>
                </div>
            </div>
        </div>

        <!-- 电池参数设置区域 -->
        <div class="schedule-request-section">
            <div class="collapsible-header" onclick="toggleBatteryParamsForm()">
                <h2>电池参数设置</h2>
                <span class="collapse-icon" id="batteryParamsCollapseIcon">▼</span>
            </div>
            <div class="schedule-controls start-controls" id="batteryParamsFormContent" style="display: none;">
                <div class="schedule-inline-form start-inline-form">
                    <input type="text" id="batteryRobotId" placeholder="机器人ID" style="width: 120px;">
                    <span class="or-text">或</span>
                    <input type="number" id="batterySerial" min="1" placeholder="序号" style="width: 100px;">

                    <input type="number" id="protectionCurrent" min="0" max="65535" placeholder="保护电流(mA)" style="width: 130px;">
                    <input type="number" id="highTempThreshold" min="0" max="255" placeholder="高温阈值" style="width: 110px;">
                    <input type="number" id="lowTempThreshold" min="0" max="255" placeholder="低温阈值" style="width: 110px;">
                    <input type="number" id="protectionTemp" min="0" max="255" placeholder="保护温度" style="width: 110px;">
                    <input type="number" id="recoveryTemp" min="0" max="255" placeholder="恢复温度" style="width: 110px;">
                    <input type="number" id="protectionVoltage" min="0" max="255" placeholder="保护电压" style="width: 110px;">
                    <input type="number" id="recoveryVoltage" min="0" max="255" placeholder="恢复电压" style="width: 110px;">
                    <input type="number" id="protectionBatteryLevel" min="0" max="255" placeholder="保护电量" style="width: 110px;">
                    <input type="number" id="limitRunBatteryLevel" min="0" max="255" placeholder="限制运行电量" style="width: 130px;">
                    <input type="number" id="recoveryBatteryLevel" min="0" max="255" placeholder="恢复电量" style="width: 110px;">

                    <div class="form-spacer"></div>
                    <button class="btn btn-success" onclick="sendBatteryParamsRequest()">发送请求</button>
                </div>
            </div>
        </div>

        <!-- 启动请求区域 -->
        <div class="start-request-section">
            <div class="collapsible-header" onclick="toggleStartForm()">
                <h2>启动请求</h2>
                <span class="collapse-icon" id="startCollapseIcon">▼</span>
            </div>
            <div class="start-controls" id="startFormContent" style="display: none;">
                <div class="start-inline-form">
                    <input type="text" id="startRobotId" placeholder="机器人ID" style="width: 120px;">
                    <span class="or-text">或</span>
                    <input type="number" id="startSerial" min="1" placeholder="序号" style="width: 100px;">
                    <div class="form-spacer"></div>
                    <button class="btn btn-success" onclick="sendStartRequest()">发送请求</button>
                </div>
            </div>
        </div>

        <!-- 校时请求区域 -->
        <div class="timesync-request-section">
            <div class="collapsible-header" onclick="toggleTimeSyncForm()">
                <h2>校时请求</h2>
                <span class="collapse-icon" id="timeSyncCollapseIcon">▼</span>
            </div>
            <div class="timesync-controls" id="timeSyncFormContent" style="display: none;">
                <div class="timesync-inline-form">
                    <input type="text" id="timeSyncRobotId" placeholder="机器人ID" style="width: 120px;">
                    <span class="or-text">或</span>
                    <input type="number" id="timeSyncSerial" min="1" placeholder="序号" style="width: 100px;">
                    <div class="form-spacer"></div>
                    <button class="btn btn-success" onclick="sendTimeSyncRequest()">发送请求</button>
                </div>
            </div>
        </div>

        <!-- 机器人列表 -->
        <div class="robots-container">
            <!-- 统计信息 -->
            <div class="statistics">
                <div class="stat-card stat-total">
                    <div class="stat-label">总数</div>
                    <div class="stat-value" id="statTotal">0</div>
                </div>
                <div class="stat-card stat-enabled">
                    <div class="stat-label">已启用</div>
                    <div class="stat-value" id="statEnabled">0</div>
                </div>
                <div class="stat-card stat-disabled">
                    <div class="stat-label">已禁用</div>
                    <div class="stat-value" id="statDisabled">0</div>
                </div>
            </div>

            <div class="pagination-controls" style="display: none;">
                <div class="page-size-control">
                    <label for="pageSize">每页显示：</label>
                    <select id="pageSize" onchange="changePageSize()">
                        <option value="10">10</option>
                        <option value="20" selected>20</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                    <span id="totalCount" style="margin-left: 15px;"></span>
                </div>
            </div>
            <div id="robotsList">
                <div class="loading">加载中...</div>
            </div>
            <div id="pagination" class="pagination"></div>
        </div>
    </div>

    <!-- 加载提示模态框 -->
    <div id="loadingModal" class="modal">
        <div class="loading-content">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">处理中...</div>
        </div>
    </div>

    <!-- 机器人详情模态框 -->
    <div id="robotModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>机器人详细信息</h2>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <div id="robotDetails">
                <div class="loading">加载中...</div>
            </div>
            <!-- 清扫记录展示区域，由 JS 在详情渲染后填充 -->
            <div id="cleanRecordsSection" style="padding: 16px 24px; display: none;"></div>
            <!-- 最近定时任务展示区域（与清扫记录并列） -->
            <div id="recentSchedulesSection" style="padding: 16px 24px; display: none;"></div>
            <!-- 所有表格统一渲染容器（置于详情底部） -->
            <div id="detailsTables" style="padding: 16px 24px; display: none;"></div>
        </div>
    </div>

    <!-- 告警设置模态框 -->
    <div id="alarmModal" class="modal">
        <div class="modal-content" style="max-width: 900px;">
            <div class="modal-header">
                <h2>告警设置 - <span id="alarmModalRobotInfo"></span></h2>
                <span class="close-btn" onclick="closeAlarmModal()">&times;</span>
            </div>
            <div id="alarmModalContent" style="padding: 20px;">
                <div class="loading">加载中...</div>
            </div>
            <div class="modal-footer" style="padding: 15px 20px; border-top: 1px solid #e0e0e0; display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn btn-secondary" onclick="closeAlarmModal()">取消</button>
                <button class="btn btn-success" onclick="saveAlarmSettings()">保存设置</button>
            </div>
        </div>
    </div>

    <script type="module" src="../js/app.js"></script>
</body>
</html>
